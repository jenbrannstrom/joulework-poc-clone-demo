<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JouleWork Browser POC</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 10%, #dbeafe, #f8fafc 40%, #ecfeff);
        color: #111827;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 80px;
        line-height: 1.7;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }
      p {
        margin: 0 0 16px;
      }
      code {
        background: #e5e7eb;
        border-radius: 4px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JouleWork POC Article</h1>
      <p>
        This is a demo page. If you opt in, your tab contributes compute while this page stays visible.
      </p>
      <p>
        Widget endpoint: <code id="endpoint-display">ws://127.0.0.1:8080/node?workerType=browser</code>
      </p>
      <p>
        The contribution pill will turn green once your estimated contribution reaches the target joules.
      </p>
    </main>

    <script src="../widget/joulework-widget.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const endpoint = params.get("endpoint") || "ws://127.0.0.1:8080/node?workerType=browser";
      const targetJoules = Number(params.get("targetJoules") || "20");
      const endpointDisplay = document.getElementById("endpoint-display");
      if (endpointDisplay) {
        endpointDisplay.textContent = endpoint;
      }

      window.startJouleWork({
        endpoint,
        targetJoules,
        workerScriptUrl: "../widget/joulework-browser-worker.js",
      });
    </script>
  </body>
</html>
