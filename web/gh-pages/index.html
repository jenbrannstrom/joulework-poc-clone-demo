<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JouleWork POC Clone Demo</title>
    <style>
      :root {
        --bg: #05070d;
        --card: #0e1320;
        --line: #2a3345;
        --ink: #e8edf7;
        --muted: #a0acc2;
        --alert: #ff3b3b;
        --accent: #00e0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 0%, #1a2235 0%, var(--bg) 45%, #030409 100%);
        color: var(--ink);
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }

      .demo-ribbon {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9998;
        background: var(--alert);
        color: #fff;
        text-align: center;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.3);
      }

      .wrap {
        width: min(1200px, 100% - 24px);
        margin: 68px auto 20px;
      }

      .frame {
        position: relative;
        border: 2px solid var(--line);
        border-radius: 18px;
        overflow: hidden;
        background: var(--card);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      .frame img {
        display: block;
        width: 100%;
        height: auto;
      }

      .clone-stamp {
        position: absolute;
        inset: auto 50% 42% auto;
        transform: translateX(50%) rotate(-8deg);
        z-index: 5;
        border: 6px solid var(--alert);
        color: var(--alert);
        background: rgba(255, 255, 255, 0.78);
        padding: 18px 34px;
        font-size: clamp(30px, 7vw, 72px);
        font-weight: 900;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-shadow: 0 2px 0 rgba(255, 255, 255, 0.8);
      }

      .subcopy {
        position: absolute;
        top: 14px;
        right: 16px;
        z-index: 6;
        background: rgba(5, 7, 13, 0.86);
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        padding: 8px 10px;
      }

      .new-toast-anchor {
        position: absolute;
        left: 14px;
        bottom: 74px;
        z-index: 20;
      }

      .new-toast {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #0b4f5f;
        border-radius: 999px;
        padding: 10px 14px;
        background: linear-gradient(90deg, #07343d 0%, #0f5d6f 60%, #0a718a 100%);
        color: #e6fbff;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .new-toast.active {
        background: linear-gradient(90deg, #0b5a2a 0%, #169f4c 60%, #20bd5d 100%);
        border-color: #0b7f35;
      }

      .new-toast.paid {
        background: linear-gradient(90deg, #2f7200 0%, #66a400 55%, #92c600 100%);
        border-color: #5d9200;
        color: #071700;
      }

      .new-toast.paused {
        background: linear-gradient(90deg, #404a5b 0%, #556176 60%, #64728a 100%);
        border-color: #5a667b;
      }

      .new-toast .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #13d4f5;
        color: #062027;
        font-weight: 900;
      }

      .legend {
        margin: 14px 4px 0;
        color: var(--muted);
        font-size: 13px;
      }

      .legend code {
        color: var(--accent);
      }

      @media (max-width: 800px) {
        .clone-stamp {
          inset: auto 50% 48% auto;
          border-width: 4px;
          padding: 10px 16px;
          letter-spacing: 0.12em;
        }

        .new-toast-anchor {
          left: 8px;
          bottom: 56px;
        }

        .new-toast {
          font-size: 11px;
          padding: 8px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="demo-ribbon">Demo Only - Clone of Brian's Article Page - Not Production</div>

    <main class="wrap">
      <section class="frame">
        <img src="./assets/brian-site-clone.png" alt="Screenshot clone of Brian's website" />

        <div class="clone-stamp">CLONE</div>

        <div class="subcopy">
          JouleWork POC overlay<br />
          Toast positioned above existing purple donation toast
        </div>

        <div class="new-toast-anchor">
          <button class="new-toast" id="new-toast-label" type="button">
            <span class="badge">J</span>
            <span>Compute Payment: Off</span>
          </button>
        </div>
      </section>

      <p class="legend">
        WebSocket endpoint is set by query param <code>?endpoint=wss://...</code>.
        Default points to <code>wss://joulework-poc.rtb.cat/node?workerType=browser</code>.
      </p>
    </main>

    <script src="./widget/joulework-widget.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const endpoint = params.get("endpoint") || "wss://joulework-poc.rtb.cat/node?workerType=browser";
      const targetJoules = Number(params.get("targetJoules") || "20");
      const toastLabel = document.getElementById("new-toast-label");

      const widget = window.startJouleWork({
        endpoint,
        targetJoules,
        workerScriptUrl: "./widget/joulework-browser-worker.js",
        showConsentBanner: false,
        showPill: false,
      });

      const updateToast = () => {
        if (!widget || !toastLabel) {
          return;
        }
        toastLabel.classList.remove("active", "paused", "paid");
        if (widget.state === "active") {
          toastLabel.classList.add("active");
          toastLabel.innerHTML =
            '<span class="badge">J</span><span>Compute Payment: ON - ' +
            widget.sessionJoules.toFixed(1) +
            "J - Click to Pause</span>";
        } else if (widget.state === "paid_share") {
          toastLabel.classList.add("paid");
          toastLabel.innerHTML =
            '<span class="badge">J</span><span>Thanks - Paid Share Reached (' +
            widget.sessionJoules.toFixed(1) +
            "J) - Click to Keep Helping</span>";
        } else if (widget.state === "paused") {
          toastLabel.classList.add("paused");
          toastLabel.innerHTML =
            '<span class="badge">J</span><span>Compute Payment: Paused - ' +
            widget.sessionJoules.toFixed(1) +
            "J - Click to Resume</span>";
        } else {
          toastLabel.innerHTML = '<span class="badge">J</span><span>Start Compute Payment (Demo)</span>';
        }
      };

      toastLabel.addEventListener("click", () => {
        if (!widget) {
          return;
        }
        if (widget.state === "initial" || widget.state === "dismissed") {
          widget.activate();
        } else if (widget.state === "active") {
          widget.pause();
        } else if (widget.state === "paused" || widget.state === "paid_share") {
          widget.resume();
        }
      });

      window.setInterval(updateToast, 500);
      updateToast();
    </script>
  </body>
</html>
